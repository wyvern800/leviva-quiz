<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Quiz rápido: descubra como o desafio de 14 dias e o app de auxílio podem se encaixar na sua rotina. Conteúdo educativo."
    />
    <title>Quiz — desafio de 14 dias · app de auxílio</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!--
      Perguntas modeladas em funil tipo Fitfy (bem-estar). O link original retornou erro ao carregar aqui;
      edite o array QUIZ_STEPS em quiz.js se tiver o roteiro oficial.
      Meta Pixel no fim do body.
    -->
    <noscript>
      <img height="1" width="1" style="display: none" src="https://www.facebook.com/tr?id=1584330449533186&ev=PageView&noscript=1" alt="" />
    </noscript>
  </head>
  <body>
    <div class="bg-wrap" aria-hidden="true">
      <div id="bg-triangles" class="bg-triangles"></div>
      <div class="bg-icons">
        <i class="fa-solid fa-mobile-screen-button bg-icons__item" style="top: 8%; left: 6%"></i>
        <i class="fa-solid fa-robot bg-icons__item" style="top: 16%; left: 88%"></i>
        <i class="fa-solid fa-calendar-check bg-icons__item" style="top: 40%; left: 4%"></i>
        <i class="fa-solid fa-wand-magic-sparkles bg-icons__item" style="top: 52%; left: 90%"></i>
        <i class="fa-solid fa-comments bg-icons__item" style="top: 68%; left: 10%"></i>
        <i class="fa-solid fa-heart-pulse bg-icons__item" style="top: 82%; left: 84%"></i>
        <i class="fa-solid fa-seedling bg-icons__item" style="top: 78%; left: 22%"></i>
        <i class="fa-solid fa-star bg-icons__item" style="top: 30%; left: 48%"></i>
      </div>
      <div class="bg-gradient"></div>
    </div>

    <main class="page page--quiz">
      <p class="quiz-brand">Desafio de 14 dias · app de auxílio</p>
      <div class="quiz-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-label="Progresso do quiz">
        <div class="quiz-progress__bar" id="quiz-progress-bar"></div>
      </div>
      <div id="quiz-root" class="quiz-root"></div>
    </main>

    <div class="modal" id="lead-modal" hidden aria-modal="true" role="dialog" aria-labelledby="modal-title">
      <div class="modal__backdrop js-close-modal" tabindex="-1"></div>
      <div class="modal__panel">
        <button type="button" class="modal__close js-close-modal" aria-label="Fechar">&times;</button>
        <h2 id="modal-title" class="modal__title">Deixe seu contato</h2>
        <p class="modal__hint">Informe e-mail e WhatsApp — os dois são obrigatórios para enviarmos o próximo passo sobre o desafio de 14 dias e o app.</p>
        <form class="lead-form" id="lead-form">
          <label class="field">
            <span class="field__label">E-mail</span>
            <input type="email" name="email" class="field__input" autocomplete="email" placeholder="nome@email.com" required />
          </label>
          <label class="field">
            <span class="field__label">WhatsApp</span>
            <input type="tel" name="whatsapp" class="field__input" inputmode="tel" autocomplete="tel" placeholder="(00) 00000-0000" required />
          </label>
          <button type="submit" class="btn btn--primary btn--block">Continuar</button>
        </form>
        <div class="modal__success" id="modal-success" hidden>
          <p class="modal__success-text">Recebemos seu contato. Em breve você recebe as próximas informações.</p>
          <button type="button" class="btn btn--secondary js-close-modal">Fechar</button>
        </div>
      </div>
    </div>

      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);

        n.loaded = !0;
        n.version = "2.0";

          console.info(
            "[Meta Pixel] fbevents.js não carregou (bloqueador ou rede). Eventos só serão enviados após o script carregar."
          );

        s.parentNode.insertBefore(t, s);
      })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");
      fbq("init", "1584330449533186");

    <script>
      window.LEAD_SHEETS_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwV03DbNmn12R4tWcxZO5fDHuXPLW__8XfVkPu7b_t4V2U_CIbYZfWqJfbFSb6oK_vs/exec";
      // Cole aqui a URL do Web App do Google Apps Script.

    <script src="https://cdn.jsdelivr.net/npm/trianglify@4.1.1/dist/trianglify.bundle.js"></script>
    <script src="bg-effects.js"></script>
    <script src="quiz.js" defer></script>
  </body>
</html>
